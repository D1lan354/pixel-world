<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pix Universe - Final Build</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="palette.js"></script> 
    <style>
        body { margin: 0; background: #0b0e14; overflow: hidden; color: white; font-family: sans-serif; }
        #canvas-wrapper { width: 100vw; height: 100vh; cursor: crosshair; }
        canvas { image-rendering: pixelated; transform-origin: 0 0; position: absolute; }
        
        /* СТИЛЬНЕ МЕНЮ */
        #ui-panel {
            position: fixed; top: 20px; right: 20px; width: 280px;
            background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(10px);
            border: 1px solid #444; padding: 20px; border-radius: 16px;
            z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #ui-panel.hidden { transform: translateX(320px); }
        .control-group { margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <div style="display:flex; justify-content:space-between;">
        <h3 style="margin:0;">Меню</h3>
        <button onclick="document.getElementById('ui-panel').classList.toggle('hidden')">✕</button>
    </div>
    <div class="control-group">
        <label>Вибір кольору:</label>
        <input type="color" id="colorPicker" style="width:100%; height:40px;">
    </div>
    <div class="control-group">
        <label>Режим: <span id="mode-status" style="color: #00ff00;">НАВІГАЦІЯ</span></label>
    </div>
    <small>Shift = Перемикач | Колесо = Зум</small>
</div>

<div id="canvas-wrapper"><canvas id="pixelCanvas" width="2048" height="2048"></canvas></div>

<script>
    const firebaseConfig = { databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const canvas = document.getElementById("pixelCanvas");
    const ctx = canvas.getContext("2d");
    
    let zoom = 1.0, posX = 0, posY = 0, isPaintingMode = false, isDragging = false;
    let selectedCode = "aaa"; // Стандартний код

    // Логіка підбору кольору з palette.js
    document.getElementById('colorPicker').oninput = (e) => {
        // Знаходимо найближчий ключ у палітрі
        let hex = e.target.value;
        // Тут проста логіка пошуку (можна ускладнити)
        selectedCode = Object.keys(palette)[0]; 
        console.log("Вибрано код:", selectedCode);
    };

    // Рендер
    db.ref('multiplayer_map').on('child_added', (s) => s.forEach(x => draw(x.key, s.key, x.val())));
    db.ref('multiplayer_map').on('child_changed', (s) => s.forEach(x => draw(x.key, s.key, x.val())));
    
    function draw(x, y, c) {
        ctx.fillStyle = palette[c] || "#000";
        ctx.fillRect(x, y, 1, 1);
    }


    // === ВИПРАВЛЕНА ЛОГІКА МИШІ ===
canvas.addEventListener("mousedown", (e) => {
    // Якщо режим малювання - малюємо
    if(isPaintingMode) {
        paint(e);
    } 
    // Якщо режим навігації - активуємо перетягування
    else {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        canvas.style.cursor = "grabbing";
    }
});

window.addEventListener("mousemove", (e) => {
    // Малювання при затиснутій кнопці, якщо режим малювання увімкнено
    if(isPaintingMode && e.buttons === 1) {
        paint(e);
    } 
    // Навігація при затиснутій кнопці, якщо режим малювання вимкнено
    else if(isDragging) {
        posX += (e.clientX - lastX);
        posY += (e.clientY - lastY);
        lastX = e.clientX;
        lastY = e.clientY;
        updateTransform();
    }
});

window.addEventListener("mouseup", () => {
    isDragging = false;
    canvas.style.cursor = isPaintingMode ? "crosshair" : "grab";
});

    // Решта логіки (Shift, Зум, Малювання) така ж, як ми узгодили
    window.addEventListener("keydown", (e) => {
        if(e.key === "Shift") {
            isPaintingMode = !isPaintingMode;
            document.getElementById('mode-status').innerText = isPaintingMode ? "МАЛЮВАННЯ" : "НАВІГАЦІЯ";
        }
    });
    
    // Ініціалізація фону
    ctx.fillStyle = "#afe7f3"; ctx.fillRect(0, 0, 2048, 2048);
</script>
</body>
</html>
