<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pix Universe - Final Build</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="palette.js"></script> 
    <style>
        body { margin: 0; background: #0b0e14; overflow: hidden; color: white; font-family: sans-serif; }
        #canvas-wrapper { width: 100vw; height: 100vh; cursor: crosshair; }
        canvas { image-rendering: pixelated; transform-origin: 0 0; position: absolute; }
        
        /* СТИЛЬНЕ МЕНЮ */
        #ui-panel {
            position: fixed; top: 20px; right: 20px; width: 280px;
            background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(10px);
            border: 1px solid #444; padding: 20px; border-radius: 16px;
            z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #ui-panel.hidden { transform: translateX(320px); }
        .control-group { margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <div style="display:flex; justify-content:space-between;">
        <h3 style="margin:0;">Меню</h3>
        <button onclick="document.getElementById('ui-panel').classList.toggle('hidden')">✕</button>
    </div>
    <div class="control-group">
        <label>Вибір кольору:</label>
        <input type="color" id="colorPicker" style="width:100%; height:40px;">
    </div>
    <div class="control-group">
        <label>Режим: <span id="mode-status" style="color: #00ff00;">НАВІГАЦІЯ</span></label>
    </div>
    <small>Shift = Перемикач | Колесо = Зум</small>
</div>

<div id="canvas-wrapper"><canvas id="pixelCanvas" width="2048" height="2048"></canvas></div>

<script>
    const canvas = document.getElementById("pixelCanvas");
    const ctx = canvas.getContext("2d");
    let zoom = 1.0, posX = 0, posY = 0, isPaintingMode = false, isDragging = false;
    let lastX, lastY;

    // 1. БЕЗПЕЧНИЙ ЗУМ (не залежить від режимів)
    canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.max(0.2, Math.min(zoom * delta, 20));
        posX -= (mouseX / zoom) * (newZoom - zoom);
        posY -= (mouseY / zoom) * (newZoom - zoom);
        zoom = newZoom;
        updateTransform();
    }, {passive: false});

    // 2. БРОНЕБІЙНА ЛОГІКА МИШІ
    canvas.addEventListener("mousedown", (e) => {
        if(isPaintingMode) {
            paint(e);
        } else {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        }
    });

    window.addEventListener("mousemove", (e) => {
        if(isPaintingMode && e.buttons === 1) {
            paint(e);
        } else if(isDragging) {
            posX += (e.clientX - lastX);
            posY += (e.clientY - lastY);
            lastX = e.clientX;
            lastY = e.clientY;
            updateTransform();
        }
    });

    window.addEventListener("mouseup", () => isDragging = false);

    // 3. ПЕРЕМИКАЧ SHIFT
    window.addEventListener("keydown", (e) => {
        if(e.key === "Shift") {
            isPaintingMode = !isPaintingMode;
            document.getElementById('mode-status').innerText = isPaintingMode ? "МАЛЮВАННЯ" : "НАВІГАЦІЯ";
            document.getElementById('mode-status').style.color = isPaintingMode ? "#00ff00" : "#ffcc00";
        }
    });

    function paint(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / zoom);
        const y = Math.floor((e.clientY - rect.top) / zoom);
        // Тут беремо код з випадаючого списку або інпуту
        const colorCode = "aaa"; 
        db.ref(`multiplayer_map/${y}/${x}`).set(colorCode);
    }

    function updateTransform() {
        canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${zoom})`;
    }
</script>
</body>
</html>
