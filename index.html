<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pix Universe v7.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0e14; font-family: sans-serif; color: white; }
        #viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; cursor: grab; }
        #pixelCanvas { transform-origin: 0 0; image-rendering: pixelated; position: absolute; }
    </style>
</head>
<body>

<div id="viewport">
    <canvas id="pixelCanvas" width="2048" height="2048"></canvas>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const canvas = document.getElementById("pixelCanvas");
    const ctx = canvas.getContext("2d");
    let zoom = 1.0, posX = 0, posY = 0;
    let isDrawingMode = false; // true = малювати, false = рухати
    let isMouseDown = false;

    const palette = { "aaa": [255, 255, 255], "zaa": [175, 231, 243], "rhh": [166, 93, 93] };

    // --- ЗВУКОВА СИСТЕМА ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(colorCode) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        // Формула тону: перетворюємо колір у частоту
        const freq = colorCode.length * 100 + 200; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // --- ЛОГІКА ПОШУКУ НАЙБЛИЖЧОГО КОЛЬОРУ ---
    function getNearestColor(r, g, b) {
        let closest = "aaa";
        let minDiff = Infinity;
        for (let code in palette) {
            let [pr, pg, pb] = palette[code];
            let diff = Math.sqrt((r-pr)**2 + (g-pg)**2 + (b-pb)**2);
            if (diff < minDiff) { minDiff = diff; closest = code; }
        }
        return closest;
    }

    // --- МАЛЮВАННЯ ТА ДВИГУН ---
    function draw() {
        canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${zoom})`;
    }

    window.addEventListener("mousedown", (e) => {
        isMouseDown = true;
        if (isDrawingMode || e.shiftKey) {
            // Малювання: Firebase запит
            const x = Math.floor((e.clientX - posX) / zoom);
            const y = Math.floor((e.clientY - posY) / zoom);
            db.ref(`multiplayer_map/${y}/${x}`).set("rhh");
            playSound("rhh");
        }
    });

    window.addEventListener("mousemove", (e) => {
        if (isMouseDown && !isDrawingMode && !e.shiftKey) {
            posX += e.movementX;
            posY += e.movementY;
            draw();
        }
    });

    window.addEventListener("mouseup", () => isMouseDown = false);

    window.addEventListener("wheel", (e) => {
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        zoom *= delta;
        zoom = Math.max(0.5, Math.min(zoom, 20));
        draw();
    });

    // Firebase слухач
    db.ref('multiplayer_map').on('child_changed', (snap) => {
        const y = snap.key;
        const row = snap.val();
        for(let x in row) {
            ctx.fillStyle = `rgb(${palette[row[x]].join(',')})`;
            ctx.fillRect(x, y, 1, 1);
        }
    });

    draw();
</script>
</body>
</html>
