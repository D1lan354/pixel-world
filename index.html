<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pix Universe - Core</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #121212; }
        #viewport { width: 100vw; height: 100vh; position: relative; cursor: crosshair; }
        #canvasWrapper { position: absolute; transform-origin: 0 0; }
        /* Границі пікселів (сітка) */
        .pixel-grid { 
            position: absolute; pointer-events: none; 
            border: 0.5px solid rgba(255,255,255,0.1); 
            display: none; 
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="canvasWrapper">
        <canvas id="pixelCanvas" width="2048" height="2048"></canvas>
    </div>
</div>

<script>
    // 1. Конфіг Firebase
    const firebaseConfig = { 
        databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const mapRef = db.ref('multiplayer_map');

    const canvas = document.getElementById("pixelCanvas");
    const ctx = canvas.getContext("2d");
    let mapData = {};

    // 2. Логіка малювання та збереження
    function draw(x, y, colorCode) {
        ctx.fillStyle = colorCode; // Тут додаси маппінг своїх кодів
        ctx.fillRect(x, y, 1, 1);
    }

    // Завантаження з бази
    mapRef.on('value', (snapshot) => {
        mapData = snapshot.val() || {};
        for (let y in mapData) {
            for (let x in mapData[y]) {
                draw(parseInt(x), parseInt(y), mapData[y][x]);
            }
        }
    });

    // Збереження в базу (короткий код)
    function savePixel(x, y, code) {
        db.ref(`multiplayer_map/${y}/${x}`).set(code);
    }

    // 3. Сітка (границі)
    // При зумі > 10, показуємо границі пікселів
    function updateGridVisibility(zoom) {
        const grid = document.getElementById('canvasWrapper');
        if (zoom > 10) {
            grid.style.outline = "1px solid rgba(255,255,255,0.05)";
        } else {
            grid.style.outline = "none";
        }
    }
</script>
</body>
</html>
