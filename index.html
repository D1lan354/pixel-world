<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нікс Мапа v6.0 — Світ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #0b0e14;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        
        /* Ігрове поле на весь екран */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
            cursor: crosshair;
            background: #afe7f3; /* Колір води за замовчуванням */
        }
        
        canvas {
            position: absolute;
            image-rendering: pixelated;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* Стильна плаваюча панель поверх карти */
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(20, 24, 33, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 18px; color: #00ff88; text-transform: uppercase; letter-spacing: 1px; }
        .player-tag { color: #ffcc00; font-weight: bold; }
        .section { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .label-text { font-size: 11px; color: #8a99ad; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* Прогрес кулдауну */
        .cooldown-container {
            width: 100%;
            background: #222733;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px;
        }
        .cooldown-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ffcc);
            transition: width 0.1s linear;
        }

        select, input[type="color"] {
            width: 100%;
            padding: 10px;
            background: #1b202e;
            border: 1px solid #2e384d;
            color: #fff;
            border-radius: 6px;
            font-weight: bold;
            outline: none;
        }
        input[type="color"] { height: 45px; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <div id="viewport">
        <canvas id="pixelCanvas"></canvas>
    </div>

    <div class="sidebar">
        <h2>Нікс Мапа v6.0</h2>
        <div style="font-size: 13px;">Гравець: <span class="player-tag">Dylan</span></div>
        
        <div class="section">
            <span class="label-text">Навігація</span>
            <div>Координати: X: <span id="coordX" style="color:#00ff88;">0</span> | Y: <span id="coordY" style="color:#00ff88;">0</span></div>
            <div>Масштаб: <span id="zoomVal" style="color:#00ffcc;">100%</span></div>
        </div>

        <div class="section">
            <span class="label-text">Перегрів (Кулдаун)</span>
            <div id="cooldownTimerText" style="font-weight: bold;">0.0с / 300с</div>
            <div class="cooldown-container">
                <div class="cooldown-bar" id="cooldownProgressBar"></div>
            </div>
        </div>

        <div class="section">
            <span class="label-text">Розмір пензля</span>
            <select id="brushSizeSelect">
                <option value="1">1 × 1 піксель</option>
                <option value="5">5 × 5 пікселів</option>
            </select>
        </div>
        
        <div class="section">
            <span class="label-text">Кастомізація кольору</span>
            <input type="color" id="nativeColorPicker" value="#a65d5d">
            <p style="margin-top:6px; font-size:12px;">Код у базі: <span id="colorCodeText" style="color:#00ffcc; font-weight:bold;">rhh</span></p>
        </div>
    </div>

    <script>
        // ===================================================
        // 1. ІНІЦІАЛІЗАЦІЯ БАЗИ ДАНИХ
        // ===================================================
        const firebaseConfig = {
            databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById("pixelCanvas");
        const ctx = canvas.getContext("2d");
        const viewport = document.getElementById("viewport");

        const MAP_SIZE = 2048;
        canvas.width = MAP_SIZE;
        canvas.height = MAP_SIZE;

        // Позиціонування камери
        let zoomLevel = 0.5; // Старт з 50%, щоб бачити більше карти
        let posX = (window.innerWidth - MAP_SIZE * zoomLevel) / 2;
        let posY = (window.innerHeight - MAP_SIZE * zoomLevel) / 2;

        let mapData = {}; 
        let currentColorCode = "rhh"; 
        let currentCooldown = 0;

        // Карта базових кольорів
        const colorPaletteMap = {
            "aaa": "#ffffff", // Суша
            "zaa": "#afe7f3", // Вода
            "rhh": "#a65d5d"  // Твій кастомний колір
        };

        function updateTransform() {
            canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${zoomLevel})`;
            document.getElementById("zoomVal").innerText = `${Math.round(zoomLevel * 100)}%`;
        }
        updateTransform();

        // ===================================================
        // 2. ДИНАМІЧНА ПАЛІТРА кольорів
        // ===================================================
        document.getElementById('nativeColorPicker').addEventListener('input', (e) => {
            let hex = e.target.value.toLowerCase();
            
            if (hex === "#ffffff") currentColorCode = "aaa";
            else if (hex === "#afe7f3") currentColorCode = "zaa";
            else {
                currentColorCode = "rhh";
                colorPaletteMap["rhh"] = hex; // На льоту міняємо HEX для коду rhh
            }
            document.getElementById('colorCodeText').innerText = currentColorCode;
        });

        // ===================================================
        // 3. СИНХРОНІЗАЦІЯ З БАЗОЮ (БЕЗ ПЕРЕЗАПИСУ СТАРОГО)
        // ===================================================
        ctx.fillStyle = "#afe7f3"; // Стартове тло
        ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

        console.log("Завантаження світу...");
        database.ref().once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                mapData = data;
                renderFullMap();
            }
            listenForLiveUpdates();
        });

        function listenForLiveUpdates() {
            database.ref().on('child_changed', (snapshot) => {
                const y = snapshot.key;
                const rowData = snapshot.val();
                if (!mapData[y]) mapData[y] = {};
                for (let x in rowData) {
                    mapData[y][x] = rowData[x];
                    drawPixel(parseInt(x), parseInt(y), rowData[x]);
                }
            });
        }

        function renderFullMap() {
            for (let y in mapData) {
                for (let x in mapData[y]) {
                    drawPixel(parseInt(x), parseInt(y), mapData[y][x]);
                }
            }
        }

        function drawPixel(x, y, colorCode) {
            ctx.fillStyle = colorPaletteMap[colorCode] || colorCode; 
            ctx.fillRect(x, y, 1, 1);
        }

        // ===================================================
        // 4. ОНОВЛЕНИЙ РОЗУМНИЙ ЗУМ (ВІДНОСНО МИШКИ)
        // ===================================================
        viewport.addEventListener("wheel", (event) => {
            event.preventDefault();

            const zoomSpeed = 0.1;
            const mouseX = event.clientX;
            const mouseY = event.clientY;

            // Координати мишки на самому канвасі до зуму
            const canvasX = (mouseX - posX) / zoomLevel;
            const canvasY = (mouseY - posY) / zoomLevel;

            if (event.deltaY < 0) {
                zoomLevel += zoomLevel * zoomSpeed; // Плавне наближення
            } else {
                zoomLevel -= zoomLevel * zoomSpeed; // Плавне віддалення
            }

            // Обмеження, щоб не втратити карту
            if (zoomLevel < 0.15) zoomLevel = 0.15;
            if (zoomLevel > 20.0) zoomLevel = 20.0;

            // Коригуємо позицію екрану, щоб зумило в точку миші
            posX = mouseX - canvasX * zoomLevel;
            posY = mouseY - canvasY * zoomLevel;

            updateTransform();
        }, { passive: false });

        // Перетягування карти мишкою (затиснувши коліщатко або правий клік)
        let isDragging = false;
        let startX, startY;

        viewport.addEventListener("mousedown", (e) => {
            if (e.button === 1 || e.button === 2 || e.shiftKey) { // Коліщатко, ПКМ або Shift+ЛКМ
                isDragging = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
                e.preventDefault();
            }
        });

        window.addEventListener("mousemove", (e) => {
            if (isDragging) {
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            }
        });

        window.addEventListener("mouseup", () => isDragging = false);
        viewport.addEventListener("contextmenu", e => e.preventDefault()); // Вимикаємо контекстне меню ПКМ

        // ===================================================
        // 5. МАЛЮВАННЯ ТА БЛОКУВАННЯ ДУБЛІВ
        // ===================================================
        viewport.addEventListener("mousedown", (event) => {
            if (event.button !== 0 || isDragging || currentCooldown >= 300) return; // Тільки ЛКМ

            // Рахуємо точний піксель
            const clickX = Math.floor((event.clientX - posX) / zoomLevel);
            const clickY = Math.floor((event.clientY - posY) / zoomLevel);

            const brushSize = parseInt(document.getElementById("brushSizeSelect").value) || 1;
            const halfBrush = Math.floor(brushSize / 2);
            
            let pixelsChanged = 0;

            for (let dy = -halfBrush; dy <= halfBrush; dy++) {
                for (let dx = -halfBrush; dx <= halfBrush; dx++) {
                    const tx = clickX + dx;
                    const ty = clickY + dy;

                    if (tx >= 0 && tx < MAP_SIZE && ty >= 0 && ty < MAP_SIZE) {
                        const existingColor = (mapData[ty] && mapData[ty][tx]) ? mapData[ty][tx] : "zaa";
                        
                        // Поточний реальний колір, який ми пишемо
                        let activeColor = currentColorCode === "rhh" ? colorPaletteMap["rhh"] : currentColorCode;

                        if (existingColor !== activeColor) {
                            if (!mapData[ty]) mapData[ty] = {};
                            mapData[ty][tx] = activeColor;
                            drawPixel(tx, ty, activeColor);

                            // Шлемо в Firebase
                            database.ref(`${ty}/${tx}`).set(activeColor);
                            pixelsChanged++;
                        }
                    }
                }
            }

            if (pixelsChanged > 0) {
                currentCooldown += pixelsChanged * 1.5; // +1.5с за піксель
                if (currentCooldown > 300) currentCooldown = 300;
                updateCooldownUI();
            }
        });

        // Трекер координат під мишкою
        viewport.addEventListener('mousemove', (e) => {
            const x = Math.floor((e.clientX - posX) / zoomLevel);
            const y = Math.floor((e.clientY - posY) / zoomLevel);
            if(x >= 0 && x < MAP_SIZE && y >= 0 && y < MAP_SIZE) {
                document.getElementById('coordX').innerText = x;
                document.getElementById('coordY').innerText = y;
            }
        });

        // Кулдаун
        setInterval(() => {
            if (currentCooldown > 0) {
                currentCooldown -= 0.2;
                if (currentCooldown < 0) currentCooldown = 0;
                updateCooldownUI();
            }
        }, 200);

        function updateCooldownUI() {
            document.getElementById("cooldownTimerText").innerText = `${currentCooldown.toFixed(1)}с / 300с`;
            document.getElementById("cooldownProgressBar").style.width = `${(currentCooldown / 300) * 100}%`;
        }
    </script>
</body>
</html>
