<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Нікс Мапа v6.0 — Виправлено</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body, html { margin: 0; width: 100%; height: 100%; background: #0b0e14; overflow: hidden; }
        #viewport { width: 100vw; height: 100vh; position: relative; cursor: crosshair; }
        /* Основний canvas */
        #pixelCanvas { position: absolute; transform-origin: 0 0; image-rendering: pixelated; }
        /* Шар сітки (границі пікселів) */
        #gridLayer { 
            position: absolute; pointer-events: none; transform-origin: 0 0;
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 1px 1px;
            display: none; 
        }
    </style>
</head>
<body>
    <div id="viewport">
        <div id="gridLayer"></div>
        <canvas id="pixelCanvas"></canvas>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const mapRef = db.ref('multiplayer_map');

        const canvas = document.getElementById("pixelCanvas");
        const ctx = canvas.getContext("2d");
        const grid = document.getElementById("gridLayer");
        const MAP_SIZE = 2048;
        canvas.width = canvas.height = MAP_SIZE;
        grid.style.width = grid.style.height = `${MAP_SIZE}px`;

        let zoom = 1.0;
        const palette = { "aaa": "#ffffff", "zaa": "#afe7f3", "rhh": "#a65d5d" };

        // Завантаження
        mapRef.on('value', (snap) => {
            const data = snap.val() || {};
            ctx.fillStyle = palette["zaa"];
            ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
            for (let y in data) {
                for (let x in data[y]) {
                    ctx.fillStyle = palette[data[y][x]] || "#000";
                    ctx.fillRect(x, y, 1, 1);
                }
            }
        });

            const x = Math.floor(e.offsetX / zoom);
            const y = Math.floor(e.offsetY / zoom);
            // Записуємо КОД, а не колір
            db.ref(`multiplayer_map/${y}/${x}`).set("rhh");
        });

        // Вмикання сітки при зумі > 5
        window.addEventListener("wheel", (e) => {
            zoom += e.deltaY > 0 ? -0.1 : 0.1;
            zoom = Math.max(0.5, Math.min(zoom, 20));
            canvas.style.transform = `scale(${zoom})`;
            grid.style.transform = `scale(${zoom})`;
            grid.style.display = zoom > 5 ? 'block' : 'none';
            grid.style.backgroundSize = `${zoom}px ${zoom}px`;
        });
    </script>
</body>
</html>
