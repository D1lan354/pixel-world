<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пікс Мапа v6.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
      };
      firebase.initializeApp(firebaseConfig);
      window.currentUser = "Гравець"; 
    </script>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="brand-title">Пікс Мапа v6.0</div>

            <div class="section">
                <div class="section-title">НАЛАШТУВАННЯ</div>
                <div class="control-group">
                    <label>Відображати сітку:</label>
                    <input type="checkbox" id="gridCheckbox" checked>
                </div>
                <div class="control-group">
                    <label>Гучність:</label>
                    <input type="range" id="volumeSlider" min="0" max="100" value="50">
                </div>
                <div class="control-group">
                    <label>Тема інтерфейсу:</label>
                    <select id="themeSelector">
                        <option value="dark">Темна (Стандарт)</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <div class="section-title">ПЕРЕГРІВ (КУЛДАУН)</div>
                <div style="font-size:11px; margin-bottom:5px; color:#aaa;">Таймер: <span id="cooldownTimer" style="color:#fff; font-weight:bold;">0.0с</span></div>
                <div class="progress-bg">
                    <div id="cooldownBar"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">ЗВУК F(T)</div>
                <canvas id="visualizerCanvas" width="220" height="30" style="background:#111; border-radius:4px; margin-bottom:5px; border:1px solid #333;"></canvas>
                <canvas id="formulaCanvas" width="220" height="30" style="background:#111; border-radius:4px; border:1px solid #333;"></canvas>
            </div>

            <div class="section">
                <div class="section-title">ОЛІВЕЦЬ ТА КОЛІР</div>
                <div class="control-group">
                    <label>Розмір пензля:</label>
                    <select id="brushSizeSelector">
                        <option value="1">1 × 1 піксель</option>
                        <option value="3">3 × 3 пікселі</option>
                        <option value="5">5 × 5 пікселів</option>
                    </select>
                </div>
                <div style="font-size:12px; margin-bottom: 8px; color:#ccc;">Режим: <span id="brushStatus" class="status-off">Крапка (Кліки)</span></div>
                
                <div style="display: flex; align-items: center; gap: 12px; margin-top: 10px;">
                    <input type="color" id="colorPicker" value="#ff0000" style="width:40px; height:40px; border:none; cursor:pointer; background:none;">
                    <div id="matchedColorBox" style="width:35px; height:35px; border-radius:4px; background-color:#ff0000; border:1px solid #444;"></div>
                    <div style="font-size:12px; color:#aaa;">Код: <span id="colorCode" style="color:#00ff00; font-family:monospace; font-weight:bold;">aaa</span></div>
                </div>
            </div>

            <div class="section player-status-section">
                <div class="section-title">ДАНІ ГРАВЦЯ</div>
                <div style="font-size:13px; margin-bottom:4px;">Гравець: <span id="hudUser" style="color:#ffcc00; font-weight:bold;">Dylan</span></div>
                <div class="hud-grid">
                    <div>X: <span id="hudX" style="color:#00ffaa;">0</span></div>
                    <div>Y: <span id="hudY" style="color:#00ffaa;">0</span></div>
                    <div>Zoom: <span id="hudZoom">100%</span></div>
                    <div>Кліки: <span id="hudClicks" style="color:#ffcc00;">0</span></div>
                </div>
                <button id="resetMapBtn" style="margin-top:10px;">Очистити карту</button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <div id="canvasContainer">
                <canvas id="mapCanvas"></canvas>
            </div>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
