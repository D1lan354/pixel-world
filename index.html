<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pix Universe - Final Engine</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="palette.js"></script> 
    
    <style>
        body { margin: 0; background: #0b0e14; overflow: hidden; color: white; font-family: sans-serif; }
        #canvas-wrapper { width: 100vw; height: 100vh; cursor: crosshair; }
        canvas { image-rendering: pixelated; transform-origin: 0 0; position: absolute; }
        #ui { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; z-index: 999; }
    </style>
</head>
<body>

<div id="ui">
    <div id="status">Режим: НАВІГАЦІЯ</div>
    <small>Shift = Перемикач | Колесо = Зум</small>
</div>

<div id="canvas-wrapper">
    <canvas id="pixelCanvas" width="2048" height="2048"></canvas>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const canvas = document.getElementById("pixelCanvas");
    const ctx = canvas.getContext("2d");
    
    let zoom = 1.0, posX = 0, posY = 0;
    let isPaintingMode = false; // Toggle-режим
    let isDragging = false;
    let lastX, lastY;
    
    // Використовуємо palette, яка прийшла з palette.js
    const getHex = (code) => palette[code] || "#000";

    // Перемикач режиму
    window.addEventListener("keydown", (e) => {
        if(e.key === "Shift") {
            isPaintingMode = !isPaintingMode;
            document.getElementById('status').innerText = isPaintingMode ? "Режим: МАЛЮВАННЯ" : "Режим: НАВІГАЦІЯ";
            canvas.style.cursor = isPaintingMode ? "crosshair" : "grab";
        }
    });

    // Логіка миші
    canvas.addEventListener("mousedown", (e) => {
        if(isPaintingMode) {
            paint(e);
        } else {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        }
    });

    window.addEventListener("mousemove", (e) => {
        if(isPaintingMode && e.buttons === 1) paint(e);
        if(isDragging) {
            posX += (e.clientX - lastX);
            posY += (e.clientY - lastY);
            lastX = e.clientX;
            lastY = e.clientY;
            updateTransform();
        }
    });

    window.addEventListener("mouseup", () => isDragging = false);

    function paint(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / zoom);
        const y = Math.floor((e.clientY - rect.top) / zoom);
        // За замовчуванням беремо перший код з палітри, або додамо вибір пізніше
        const colorCode = Object.keys(palette)[0]; 
        db.ref(`multiplayer_map/${y}/${x}`).set(colorCode);
    }

    // Зум під курсором
    canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.max(0.2, Math.min(zoom * delta, 20));
        posX -= (mouseX / zoom) * (newZoom - zoom);
        posY -= (mouseY / zoom) * (newZoom - zoom);
        zoom = newZoom;
        updateTransform();
    }, {passive: false});

    function updateTransform() {
        canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${zoom})`;
    }

    // Рендер
    db.ref('multiplayer_map').on('child_added', (s) => s.forEach(x => draw(x.key, s.key, x.val())));
    db.ref('multiplayer_map').on('child_changed', (s) => s.forEach(x => draw(x.key, s.key, x.val())));
    
    function draw(x, y, c) {
        ctx.fillStyle = getHex(c);
        ctx.fillRect(x, y, 1, 1);
    }

    ctx.fillStyle = "#afe7f3"; ctx.fillRect(0, 0, 2048, 2048);
</script>
</body>
</html>
