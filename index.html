<script>
    // 1. Ініціалізація
    const firebaseConfig = { databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. ФУНКЦІЯ ПЛЄЄРА (не стирає, а ДОДАЄ)
    function savePixel(x, y, color) {
        // Ми пишемо в конкретну точку, не чіпаючи іншу базу
        db.ref('multiplayer_map/' + y + '/' + x).set(color);
    }

    // 3. ФУНКЦІЯ ЗАВАНТАЖЕННЯ (бере тільки те, що є)
    function loadMap() {
        db.ref('multiplayer_map').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                renderFullMap(data); // Твоя функція малювання
            }
        });
    }

    // 4. Твій генератор (ДОДАЄ масив)
    async function uploadToFirebase(fullMapData) {
        // Ми НЕ робимо .set(null), ми просто оновлюємо гілку
        // Firebase сам об'єднає нові дані зі старими
        await db.ref('multiplayer_map').update(fullMapData);
        alert("Дані додано до бази без видалення!");
    }
</script>
