<div class="section-title">КАСТОМІЗАЦІЯ</div>
<div class="control-group" style="margin-bottom: 10px;">
    <label style="color: #aaa; font-size: 12px;">Розмір пензля:</label>
    <select id="brushSizeSelector" style="background: #222; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; float: right; width: 120px;">
        <option value="1">1 × 1 піксель</option>
        <option value="3">3 × 3 пікселі</option>
        <option value="5">5 × 5 пікселів</option>
    </select>
    <div style="clear: both;"></div>
</div>

<div class="control-group" style="margin-bottom: 10px;">
    <label style="color: #aaa; font-size: 12px;">Тема інтерфейсу:</label>
    <select id="themeSelector" style="background: #222; color: #fff; border: 1px solid #444; padding: 4px; border-radius: 4px; float: right; width: 120px;">
        <option value="dark">Темна (Стандарт)</option>
    </select>
    <div style="clear: both;"></div>
</div>

<div class="control-group" style="margin-bottom: 10px;">
    <label style="color: #aaa; font-size: 12px; display: inline-block;">Відображати сітку:</label>
    <input type="checkbox" id="gridCheckbox" checked style="float: right; margin-top: 4px;">
    <div style="clear: both;"></div>
</div>

<div class="control-group" style="margin-bottom: 15px;">
    <label style="color: #aaa; font-size: 12px;">Загальна гучність:</label>
    <input type="range" id="volumeSlider" min="0" max="100" value="50" style="float: right; width: 120px; margin-top: 4px;">
    <div style="clear: both;"></div>
</div>
