<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пікс Мапа v6.0 (Мультиплеєр 2048 × 2048)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Головна зона з Canvas */
        .main-container {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            image-rendering: pixelated;
            background-color: #afe7f3; /* Базовий колір світло-блакитної води */
            cursor: crosshair;
        }

        /* Верхня плашка інфо */
        .top-bar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            border: 1px solid #333;
            text-align: center;
        }
        .top-bar span { color: #00ffcc; }

        /* Бічна панель меню (Праворуч) */
        .sidebar {
            width: 320px;
            background: #181818;
            border-left: 1px solid #282828;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 11;
        }

        h2 { font-size: 18px; color: #00ff88; text-transform: uppercase; letter-spacing: 1px; }
        .section { background: #202020; padding: 12px; border-radius: 8px; border: 1px solid #2c2c2c; }
        .label-text { font-size: 12px; color: #aaa; margin-bottom: 6px; display: block; text-transform: uppercase; }

        /* Палітра кольорів */
        .palette-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 5px;
        }
        .color-box {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            border: 2px solid #fff;
        }

        /* Кулдаун прогрес-бар */
        .cooldown-container {
            width: 100%;
            background: #333;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
        }
        .cooldown-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ffcc);
            transition: width 0.1s linear;
        }

        /* Елементи форми */
        select, button {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: #00ff88; }
        
        button.danger-btn {
            background: #c82333;
            border-color: #bd2130;
            margin-top: auto;
        }
        button.danger-btn:hover { background: #bd2130; }

        /* Дані гравця */
        .player-info { font-size: 13px; line-height: 1.6; }
        .player-info strong { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="top-bar">
        Пікс Мапа v6.0 | Світ: <span>Спільний онлайн</span> | Shift — режим пензля | Ctrl+Клік — піпетка | Коліщатко — Зум
    </div>

    <div class="main-container" id="viewport">
        <canvas id="pixelCanvas" width="2048" height="2048"></canvas>
    </div>

    <div class="sidebar">
        <h2>Нікс Мапа v6.0</h2>
        
        <div class="section player-info">
            <div>Гравець: <strong id="playerName">Dylan</strong></div>
            <div>Координати: X: <span id="coordX">0</span> | Y: <span id="coordY">0</span></div>
            <div>Масштаб зуму: <span id="zoomVal">100%</span></div>
        </div>

        <div class="section">
            <span class="label-text">Палітра</span>
            <div class="palette-preview">
                <input type="color" id="colorPicker" value="#ffffff" style="display:none;">
                <div class="color-box" id="activeColorBox" style="background-color: #ffffff; cursor:pointer;" title="Натисніть для зміни кольору"></div>
                <div>Код кольору: <span id="colorCodeText" style="font-family:monospace; color:#00ffcc;">aaa</span></div>
            </div>
        </div>

        <div class="section">
            <span class="label-text">Перегрів (Кулдаун)</span>
            <div>Таймер: <span id="cooldownTimerText">0.0с</span> / 300с</div>
            <div class="cooldown-container">
                <div class="cooldown-bar" id="cooldownProgressBar"></div>
            </div>
        </div>

        <div class="section">
            <span class="label-text">Кастомізація пензля</span>
            <label style="font-size:12px; display:block; margin-bottom:4px;">Розмір пензля:</label>
            <select id="brushSizeSelect">
                <option value="1">1 × 1 піксель</option>
                <option value="5">5 × 5 пікселів</option>
            </select>
        </div>

        <button class="danger-btn" onclick="clearFullOnlineMap()">Очистити всю карту онлайн</button>
    </div>

    <script src="player.js"></script>
</body>
</html>
