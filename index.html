<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pix Universe - Pro Controller</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: sans-serif; overflow: hidden; }
        #canvas-wrapper { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        canvas { image-rendering: pixelated; position: absolute; transform-origin: 0 0; cursor: crosshair; }
        
        #ui-panel {
            position: fixed; top: 10px; right: 10px; width: 260px;
            background: rgba(20, 20, 25, 0.95); padding: 15px; border-radius: 12px;
            border: 1px solid #444; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .row { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        input[type="color"] { width: 100%; height: 40px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h3>Контроль</h3>
    <div class="row">
        <label>Вибрати колір:</label>
        <input type="color" id="colorPicker" value="#ffffff">
    </div>
    <div class="row">
        <label>Розмір пензля: <span id="sizeVal">1</span></label>
        <input type="range" id="brushSize" min="1" max="5" value="1">
    </div>
    <div class="row" style="font-size: 12px; color: #aaa;">
        <b>Shift</b> - Малювання<br>
        <b>Без Shift</b> - Рух карти<br>
        <b>Колесо</b> - Зум під курсором
    </div>
</div>

<div id="canvas-wrapper">
    <canvas id="pixelCanvas" width="2048" height="2048"></canvas>
</div>

<script>
    // 1. БЕЗПЕЧНА ІНІЦІАЛІЗАЦІЯ
    const firebaseConfig = { databaseURL: "https://pixel-world-db-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const canvas = document.getElementById("pixelCanvas");
    const ctx = canvas.getContext("2d");
    
    // Стан
    let zoom = 1.0, posX = 0, posY = 0;
    let isDragging = false;
    let lastX, lastY;
    
    // Палітра (Коди бази -> HEX)
    const palette = { 
        "aaa": { hex: "#ffffff", r: 255, g: 255, b: 255 },
        "zaa": { hex: "#afe7f3", r: 175, g: 231, b: 243 },
        "rhh": { hex: "#a65d5d", r: 166, g: 93, b: 93 }
    };
    
    let selectedCode = "aaa";

    // 2. АВТО-ПІДБІР КОЛЬОРУ (Nearest Neighbor)
    function hexToRgb(hex) {
        let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        return {r, g, b};
    }

    function findNearestColor(hex) {
        const rgb = hexToRgb(hex);
        let minDiff = 999999;
        let bestCode = "aaa";
        
        for (let code in palette) {
            let p = palette[code];
            let diff = Math.sqrt(Math.pow(rgb.r - p.r, 2) + Math.pow(rgb.g - p.g, 2) + Math.pow(rgb.b - p.b, 2));
            if (diff < minDiff) { minDiff = diff; bestCode = code; }
        }
        return bestCode;
    }

    document.getElementById('colorPicker').oninput = (e) => {
        selectedCode = findNearestColor(e.target.value);
    };

    // 3. ЯДРО МАЛЮВАННЯ ТА ЗУМУ
    function updateTransform() {
        canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${zoom})`;
    }

    function paint(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / zoom);
        const y = Math.floor((e.clientY - rect.top) / zoom);
        const size = parseInt(document.getElementById("brushSize").value);
        
        for(let i=0; i<size; i++) {
            for(let j=0; j<size; j++) {
                db.ref(`multiplayer_map/${y+i}/${x+j}`).set(selectedCode);
            }
        }
    }

    // 4. СЛУХАЧІ МИШІ ТА КЛАВІАТУРИ
    canvas.addEventListener("mousedown", (e) => {
        if(e.shiftKey) paint(e);
        else {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        }
    });

    window.addEventListener("mousemove", (e) => {
        if(e.shiftKey && e.buttons === 1) paint(e);
        else if(isDragging) {
            posX += (e.clientX - lastX);
            posY += (e.clientY - lastY);
            lastX = e.clientX;
            lastY = e.clientY;
            updateTransform();
        }
    });

    window.addEventListener("mouseup", () => isDragging = false);

    // ЗУМ ПІД КУРСОРОМ
    canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        const mouseX = e.clientX - canvas.getBoundingClientRect().left;
        const mouseY = e.clientY - canvas.getBoundingClientRect().top;
        
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.max(0.2, Math.min(zoom * delta, 20));
        
        // Математика зуму відносно курсора
        posX -= (mouseX / zoom) * (newZoom - zoom);
        posY -= (mouseY / zoom) * (newZoom - zoom);
        
        zoom = newZoom;
        updateTransform();
    }, {passive: false});

    // 5. РЕНДЕР (ОПТИМІЗОВАНИЙ)
    db.ref('multiplayer_map').on('child_added', (snap) => {
        const y = parseInt(snap.key);
        snap.forEach(xSnap => {
            const x = parseInt(xSnap.key);
            ctx.fillStyle = palette[xSnap.val()] ? palette[xSnap.val()].hex : "#000";
            ctx.fillRect(x, y, 1, 1);
        });
    });

    db.ref('multiplayer_map').on('child_changed', (snap) => {
        const y = parseInt(snap.key);
        snap.forEach(xSnap => {
            const x = parseInt(xSnap.key);
            ctx.fillStyle = palette[xSnap.val()] ? palette[xSnap.val()].hex : "#000";
            ctx.fillRect(x, y, 1, 1);
        });
    });

    // Ініціалізація фону
    ctx.fillStyle = "#afe7f3";
    ctx.fillRect(0, 0, 2048, 2048);
</script>
</body>
</html>
